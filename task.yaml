id: glitchtip-valkey-backup-freshness-gap
prompt: |
  [Context]
  The cluster is air-gapped. There is no internet egress; only images
  already loaded into the local image store may be used. Standard
  cluster utilities (kubectl, valkey-cli, redis-cli, psql, sha256sum,
  base64, python3, openssl) and any images already pulled into the
  cluster are available.

  The platform team reran the GlitchTip recovery drill after a rough
  week of incident noise, and the uncomfortable finding this time was
  not the database dump or the attachment archive. Those existed.

  The bad surprise was that the restored runtime state backed by Valkey
  was clearly older than the point when the backup job claimed success.
  Recent mute state, throttling data, and other short-horizon
  coordination state that operators expected to survive the drill did
  not line up with the moment the backup was supposedly taken.

  The current pipeline is giving people the wrong kind of confidence:
  it can produce a green-looking run record even when the Valkey
  portion is stale, not freshly snapshotted, or not realistically
  reusable for recovery.

  [TASK]
  Investigate the existing backup flow in the `glitchtip` namespace
  and make the Valkey portion trustworthy again.

  A healthy run should only report success after it has actually
  captured a fresh Valkey backup artifact and left that artifact
  somewhere durable in the cluster. A bad run should stop itself
  instead of quietly publishing a green record based on stale state
  or pod-local scratch output.

  There is already a human-readable run note and a machine-readable
  restore handoff in the cluster, but on-call cannot trust either one
  right now. Refresh both of them from the latest run without
  requiring someone to open pod logs. Failed runs should clearly mark
  restore as unsafe. Successful runs should include enough evidence
  that the consumer can verify the artifact is current, was produced
  by the run that claims to have produced it, and has not been
  tampered with after publication.

  Recovery tooling will be hard on the artifact. It will load the
  captured bytes into a clean Valkey instance and verify the key set
  comes back. So a "successful" backup whose stored bytes can't
  actually be restored is the exact failure mode operators are trying
  to catch this round.

  Snapshot semantics. A snapshot must reflect the master's keyspace
  at one consistent moment. Recovery tooling will inspect the captured
  bytes and reject artifacts that include writes which landed on the
  master after the snapshot was supposedly taken â€” i.e. live
  re-serializations of the keyspace at fetch time will be detected,
  not just fork-frozen images. A snapshot taken during run N+1 must
  also demonstrably postdate the snapshot taken during run N;
  re-publishing the same on-disk image counts as a stale run, not a
  fresh one. The Valkey workload runs as a multi-pod StatefulSet with
  standard replication topology, and only the writable member's view
  is acceptable as a backup source â€” replicas may have an unbounded
  lag relative to the master.

  Authenticity. The run record must carry cryptographic proof that
  the publish came from the run it claims to be from, that the same
  signing identity was not reused across consecutive runs, and that
  the public component was registered with the cluster's trust
  anchor before the publish. The trust anchor is materialised as an
  in-cluster object in the `glitchtip` namespace; agents are
  expected to inspect its annotations to learn which algorithm,
  fingerprint format, and registration protocol the cluster
  considers acceptable.

  Schema. The cluster ships a content-shape policy at admission that
  rejects ill-formed handoff publishes; agents are expected to
  inspect the cluster's `ValidatingAdmissionPolicy` and any related
  `ValidatingAdmissionPolicyBinding` resources to learn what the
  consumer reads. Recovery tooling reads only the field shape the
  policy admits.

  Storage. The artifact must end up in a durable in-cluster resource
  that survives pod and node turnover. A pre-provisioned archive
  PVC is available in the namespace for backups that need the PVC
  route; namespace `ResourceQuota` does not budget additional PVCs
  for backup workloads. Whatever resource the handoff points to must
  be reachable by recovery tooling from outside the backup pod's
  mount namespace, so the path semantics in the handoff must
  reference the resource's own root, not the agent's chosen
  container mount-point.

  Runtime identity. The backup workload runs in the `glitchtip`
  namespace, which enforces standard cluster security guardrails on
  pods (the cluster security profile is observable via the
  namespace's labels). The backup must run under a dedicated
  ServiceAccount; the namespace's `default` identity has historical
  bindings that should not be relied on. The dedicated SA must hold
  only the verbs it actually needs to keep the runtime status
  surfaces in sync with each run â€” broader access (CronJob mutation,
  unrestricted ConfigMap or Secret writes, deletion verbs) is
  treated as a misconfiguration.

  Do not solve this by hand-editing live Valkey data, disabling the
  guardrails, or broadening access just to force a green result.
  The point is to make the pipeline tell the truth about what it
  captured and preserve a backup that downstream recovery tooling
  can actually use.

  A few earlier fixes looked fine for one run and then quietly
  drifted back after the surrounding backup automation reconciled
  itself, so make sure the repair survives the current job-management
  flow instead of only working once. The supported reconcile and
  template-management CronJobs are part of that flow and should not
  be torn out â€” fix the pipeline in place.

  Operational hints â€” including specific field names the consumer
  expects, the signing/fingerprint conventions, the storage shape,
  and which Valkey commands matter for snapshot consistency â€” are
  carried by runtime objects in the `glitchtip` namespace
  (ConfigMap annotations, admission policy CEL expressions,
  pre-populated handoff schema, namespace labels). Inspect the
  cluster, not the prose.
metadata:
  category: platform-eng
  difficulty: hard
